<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CV Oluşturucu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --sidebar-bg: #ffffff;
            --input-bg: #f9fafb;
            --text-main: #1f2937;
            --cv-color: #2A363B;
            --cv-font: 'Segoe UI', sans-serif;
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, system-ui, sans-serif; 
            background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; overflow-x: hidden;
        }

        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; }
        #step-2.active { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }

        /* === 1. ADIM === */
        #step-1 { text-align: center; padding: 60px 20px; overflow-y: auto; height: 100vh; }
        #step-1 h1 { font-size: 2.5rem; font-weight: 800; color: #1e293b; margin-bottom: 40px; }
        .template-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 20px; cursor: pointer; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid transparent; transition: transform 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary-color); }
        .card h2 { font-size: 1.1rem; margin-top: 15px; color: #334155; }
        
        /* ŞABLON ÖN İZLEME KARTLARI */
        .card-preview { height: 280px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; position: relative; overflow: hidden; background: #fff; }
        .minimal .card-preview { background: linear-gradient(to right, #2A363B 35%, #fff 35%); }
        .minimal .card-preview::before { content:''; position:absolute; top:25px; left:17.5%; width:40px; height:40px; background:rgba(255,255,255,0.4); border-radius:50%; transform:translateX(-50%); }
        .minimal .card-preview::after { content:''; position:absolute; top:30px; left:45%; width:45%; height:8px; background:#cbd5e1; border-radius:4px; box-shadow: 0 15px 0 #e2e8f0, 0 30px 0 #f1f5f9, 0 60px 0 #2A363B, 0 75px 0 #e2e8f0, 0 90px 0 #f1f5f9; }
        .prof .card-preview { background: linear-gradient(to bottom, #333333 25%, #fff 25%); }
        .prof .card-preview::before { content:''; position:absolute; top:25%; left:50%; width:45px; height:45px; background:#e2e8f0; border-radius:50%; transform:translate(-50%, -50%); border:3px solid #fff;}
        .prof .card-preview::after { content:''; position:absolute; top:45%; left:15%; width:70%; height:8px; background:#333333; border-radius:4px; box-shadow: 0 15px 0 #e2e8f0, 0 30px 0 #f1f5f9, 0 50px 0 #333333, 0 65px 0 #e2e8f0; }
        .modern .card-preview { background: linear-gradient(to right, #f8fafc 38%, #fff 38%); }
        .modern .card-preview::before { content:''; position:absolute; top:25px; left:19%; width:45px; height:45px; background:#e2e8f0; border-radius:50%; transform:translateX(-50%); box-shadow: 0 0 0 3px #fff, 0 0 0 5px #1e293b; }
        .modern .card-preview::after { content:''; position:absolute; top:35px; left:48%; width:40%; height:10px; background:#1e293b; border-radius:4px; box-shadow: 0 20px 0 #e2e8f0, 0 35px 0 #f1f5f9, 0 65px 0 #1e293b, 0 80px 0 #e2e8f0; }
        .green .card-preview { background: linear-gradient(to right, #4b6e53 35%, #fff 35%); }
        .green .card-preview::before { content:''; position:absolute; top:25px; left:17.5%; width:40px; height:40px; background:rgba(255,255,255,0.6); border-radius:8px; transform:translateX(-50%); border: 2px solid #fff;}
        .green .card-preview::after { content:''; position:absolute; top:30px; left:45%; width:45%; height:8px; background:#4b6e53; border-radius:4px; box-shadow: 0 15px 0 #e2e8f0, 0 30px 0 #f1f5f9, 0 60px 0 #4b6e53, 0 75px 0 #e2e8f0; }
        .lilac .card-preview { background: linear-gradient(to right, #f4ebfa 35%, #fff 35%); border-color: #d1bfe3; }
        .lilac .card-preview::before { content:''; position:absolute; top:25px; left:17.5%; width:40px; height:40px; background:#fff; border-radius:12px; transform:translateX(-50%); border: 2px solid #614d6b;}
        .lilac .card-preview::after { content:''; position:absolute; top:35px; left:45%; width:40%; height:9px; background:#614d6b; border-radius:5px; box-shadow: 0 20px 0 #e2e8f0, 0 35px 0 #f1f5f9, 0 65px 0 #eadef2, 0 80px 0 #f1f5f9; }
        .mono .card-preview { background: linear-gradient(to right, #111 40%, #fff 40%); }
        .mono .card-preview::before { content:''; position:absolute; top:25px; left:20%; width:50px; height:50px; background:#e2e8f0; border-radius:50%; transform:translateX(-50%); border: 4px solid #fff;}
        .mono .card-preview::after { content:''; position:absolute; top:35px; left:50%; width:35%; height:14px; background:#111; border-radius:0; box-shadow: 0 25px 0 #e2e8f0, 0 40px 0 #f1f5f9, 0 70px 0 #111, 0 85px 0 #e2e8f0; }

        /* === 2. ADIM: EDİTÖR === */
        .sidebar { width: 450px; background: var(--sidebar-bg); padding: 30px; border-right: 1px solid #e5e7eb; overflow-y: auto; height: 100%; box-shadow: 10px 0 30px rgba(0,0,0,0.02); z-index: 10; flex-shrink: 0; }
        .preview { flex: 1; background: #334155; display: flex; flex-direction: column; align-items: center; overflow-y: auto; overflow-x: auto; padding: 0; }

        .toolbar { display: flex; gap: 15px; background: #1e293b; padding: 15px 30px; width: 100%; justify-content: center; align-items: center; color: white; flex-wrap: wrap; flex-shrink: 0; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .toolbar label { color: white; margin: 0; display: inline-block; font-size: 13px; font-weight: bold; }
        .toolbar input[type="color"] { width: 40px; height: 30px; padding: 0; border: none; border-radius: 5px; cursor: pointer; vertical-align: middle; margin-left: 5px; }
        .toolbar select, .toolbar input[type="range"] { padding: 5px 10px; border-radius: 5px; color: #333; vertical-align: middle; margin-left: 5px;}
        
        label { font-weight: 600; font-size: 12px; color: #475569; text-transform: uppercase; margin-top: 25px; margin-bottom: 8px; display: block; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: var(--input-bg); margin-bottom: 10px; font-family: inherit; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary-color); outline: none; background: #fff; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; font-size: 13px; flex: 1; text-align: center; transition: background 0.2s;}
        .btn-outline { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-outline:hover { background: #e2e8f0; }
        .btn-action { background: #f59e0b; color: white; }
        .btn-action:hover { background: #d97706; }
        .btn-clear { background: #ef4444; color: white; }
        .pdf-btn { background: #10b981; color: #fff; border: none; padding: 16px; width: 100%; cursor: pointer; font-weight: 700; margin-top: 30px; border-radius: 12px; font-size: 16px; transition: transform 0.2s, background 0.2s; }
        .pdf-btn:hover { background: #059669; transform: translateY(-2px); }

        .dynamic-block { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; }
        .block-actions { display: flex; justify-content: space-between; margin-top: 10px; gap: 5px; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; font-weight: bold;}
        .btn-updown { background: #e2e8f0; color: #333; }
        .btn-updown:hover { background: #cbd5e1; }
        .btn-remove { background: #fee2e2; color: #ef4444; }
        .btn-remove:hover { background: #fca5a5; color: white; }
        .btn-add { background: #e0e7ff; color: var(--primary-color); border: 2px dashed var(--primary-color); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; transition: background 0.2s; }
        .btn-add:hover { background: #c7d2fe; }

        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: var(--primary-color); color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .tag span { cursor: pointer; font-weight: bold; }

        /* === CV KAĞIDI ANA İSKELETİ === */
        #zoom-wrapper { display: flex; justify-content: center; transform-origin: top center; transition: transform 0.2s; padding: 40px; }
        
        #cv-paper { 
            width: 210mm; 
            min-height: 297mm; 
            background: #fff; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            position: relative; 
            font-family: var(--cv-font); 
            overflow: hidden; 
            flex-shrink: 0; 
        }
        
        /* BOŞ ALAN YÖNETİMİ (PDF'TE GİZLEME) */
        .is-empty { opacity: 0.4; transition: opacity 0.3s; }
        .pdf-mode .is-empty { display: none !important; }
        @media print { .is-empty { display: none !important; } }

        .cv-body-flex { display: flex; flex-direction: row; width: 100%; min-height: 297mm; }
        
        .prof-only { display: none; }
        .sec { margin-bottom: 30px; } 
        .sec h4 { margin: 0 0 10px 0; font-size: 15px; }
        .sec p { margin: 0; line-height: 1.6; font-size: 13px; color: #444; white-space: pre-wrap; word-wrap: break-word; }
        .cv-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .cv-tag { background: var(--cv-color); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; opacity: 0.9; }

        /* === TEMALAR === */
        .minimalist-theme .cv-left { width: 35%; background: var(--cv-color); color: #fff; padding: 40px 25px; flex-shrink: 0; }
        .minimalist-theme .cv-right { width: 65%; padding: 50px 40px; color: #333; }
        .minimalist-theme .cv-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; margin: 0 auto 30px auto; display: block; }
        .minimalist-theme .name-area h1 { font-size: 36px; color: var(--cv-color); margin: 0 0 5px 0; text-transform: uppercase; line-height: 1.1; }
        .minimalist-theme .name-area h2 { font-size: 18px; color: #7f8c8d; margin: 0 0 35px 0; font-weight: normal; }
        .minimalist-theme .cv-left .sec p { color: #ddd; }
        .minimalist-theme .cv-left .sec h4 { border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; text-transform: uppercase;}
        .minimalist-theme .cv-right .sec h4 { border-bottom: 1px solid var(--cv-color); color: var(--cv-color); padding-bottom: 5px; text-transform: uppercase;}
        
        .professional-theme .prof-only { display: flex; flex-direction: column; align-items: center; background: var(--cv-color); color: white; padding: 40px 20px; text-align: center; }
        .professional-theme .hide-prof { display: none !important; }
        .professional-theme .cv-img { width: 160px; height: 160px; border-radius: 50%; border: 5px solid #fff; object-fit: cover; margin-bottom: 20px; }
        .professional-theme .out-name { font-size: 34px; margin: 0; letter-spacing: 2px; }
        .professional-theme .out-job { font-size: 16px; margin: 10px 0 0 0; font-style: italic; opacity: 0.9; }
        .professional-theme .cv-body-flex { padding: 40px; gap: 40px; }
        .professional-theme .cv-left { width: 35%; flex-shrink: 0; }
        .professional-theme .cv-right { width: 65%; }
        .professional-theme .sec h4 { font-size: 15px; border-bottom: 2px solid var(--cv-color); color: var(--cv-color); padding-bottom: 5px; text-transform: uppercase; }

        .modern-theme .cv-left { width: 38%; background: #fcfcfc; padding: 50px 30px; border-right: 2px solid #eee; flex-shrink: 0; }
        .modern-theme .cv-right { width: 62%; padding: 50px 40px; }
        .modern-theme .cv-img { width: 170px; height: 170px; border-radius: 50%; box-shadow: 0 0 0 5px #fff, 0 0 0 7px var(--cv-color); object-fit: cover; margin: 0 auto 40px auto; display: block; }
        .modern-theme .name-area h1 { font-size: 40px; font-weight: 800; color: var(--cv-color); margin: 0 0 5px 0; letter-spacing: -1px; }
        .modern-theme .name-area h2 { font-size: 20px; color: #666; border-bottom: 3px solid var(--cv-color); display: inline-block; padding-bottom: 10px; margin: 0 0 35px 0;}
        .modern-theme .sec h4 { font-size: 15px; font-weight: bold; color: var(--cv-color); margin-bottom: 10px; position: relative; padding-left: 15px; }
        .modern-theme .sec h4::before { content: ''; position: absolute; left: 0; top: 2px; width: 4px; height: 14px; background: var(--cv-color); }

        .green-theme .cv-left { width: 35%; background: var(--cv-color); color: #fff; padding: 40px 25px; flex-shrink: 0; }
        .green-theme .cv-right { width: 65%; padding: 50px 40px; color: #333; background: #fff;}
        .green-theme .cv-img { width: 160px; height: 160px; border-radius: 15px; border: 3px solid #fff; object-fit: cover; margin: 0 auto 30px auto; display: block; } 
        .green-theme .name-area h1 { font-size: 36px; color: var(--cv-color); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px;}
        .green-theme .name-area h2 { font-size: 18px; color: #5a7360; margin: 0 0 35px 0; font-weight: normal; }
        .green-theme .cv-left .sec p { color: #e8eee9; }
        .green-theme .cv-left .sec h4 { border-bottom: 2px solid rgba(255,255,255,0.4); padding-bottom: 5px; text-transform: uppercase; }
        .green-theme .cv-right .sec h4 { border-bottom: 2px solid var(--cv-color); color: var(--cv-color); padding-bottom: 5px; text-transform: uppercase; }

        .lilac-theme .cv-left { width: 35%; background: #f4ebfa; color: #4a3b52; padding: 40px 25px; border-right: 1px solid #e1d5eb; flex-shrink: 0;}
        .lilac-theme .cv-right { width: 65%; padding: 50px 40px; color: #333; background: #fff;}
        .lilac-theme .cv-img { width: 170px; height: 170px; border-radius: 40px; border: 4px solid var(--cv-color); object-fit: cover; margin: 0 auto 30px auto; display: block; } 
        .lilac-theme .name-area h1 { font-size: 34px; color: var(--cv-color); margin: 0 0 5px 0; letter-spacing: 1px;}
        .lilac-theme .name-area h2 { font-size: 16px; color: #8a7396; margin: 0 0 35px 0; font-weight: bold; }
        .lilac-theme .sec h4 { background: #eadef2; color: var(--cv-color); padding: 5px 10px; border-radius: 5px; display: inline-block; margin-bottom: 12px; text-transform: uppercase;}

        .monochrome-theme .cv-left { width: 40%; background: var(--cv-color); color: #fff; padding: 50px 30px; flex-shrink: 0; }
        .monochrome-theme .cv-right { width: 60%; padding: 50px 40px; color: #111; background: #fff;}
        .monochrome-theme .cv-img { width: 180px; height: 180px; border-radius: 50%; border: 6px solid #fff; object-fit: cover; margin: 0 auto 40px auto; display: block; }
        .monochrome-theme .name-area h1 { font-size: 42px; color: var(--cv-color); font-weight: 900; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: -1px; }
        .monochrome-theme .name-area h2 { font-size: 18px; color: #666; margin: 0 0 35px 0; letter-spacing: 3px; text-transform: uppercase; }
        .monochrome-theme .cv-left .sec p { color: #ccc; }
        .monochrome-theme .sec h4 { border-bottom: 3px solid var(--cv-color); color: var(--cv-color); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold;}
        .monochrome-theme .cv-left .sec h4 { border-color: #fff; color: #fff; }

        @media (max-width: 1000px) {
            #step-2.active { flex-direction: column; overflow-y: auto; height: auto;}
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e5e7eb; }
            #zoom-wrapper { transform: scale(0.6) !important; transform-origin: top center; margin-bottom: -400px; padding: 10px;}
        }
    </style>
</head>
<body>

    <div id="step-1" class="screen active">
        <h1>Premium CV Şablonunu Seç</h1>
        <div class="template-container">
            <div class="card minimal" onclick="startEditor('minimalist-theme', '#2A363B')">
                <div class="card-preview"></div><h2>Minimalist Siyah</h2>
            </div>
            <div class="card prof" onclick="startEditor('professional-theme', '#333333')">
                <div class="card-preview"></div><h2>Klasik Profesyonel</h2>
            </div>
            <div class="card modern" onclick="startEditor('modern-theme', '#1e293b')">
                <div class="card-preview"></div><h2>Modern Çizgili</h2>
            </div>
            <div class="card green" onclick="startEditor('green-theme', '#4b6e53')">
                <div class="card-preview"></div><h2>Doğa Yeşili</h2>
            </div>
            <div class="card lilac" onclick="startEditor('lilac-theme', '#614d6b')">
                <div class="card-preview"></div><h2>Soft Lila</h2>
            </div>
            <div class="card mono" onclick="startEditor('monochrome-theme', '#111111')">
                <div class="card-preview"></div><h2>Siyah & Beyaz</h2>
            </div>
        </div>
    </div>

    <div id="step-2" class="screen">
        
        <aside class="sidebar" id="form-area">
            <div class="btn-group">
                <button class="btn btn-outline" onclick="goBack()">⬅ Şablonlar</button>
                <button class="btn btn-action" onclick="loadDummyData()">🪄 Örnek Doldur</button>
                <button class="btn btn-clear" onclick="clearData()">🗑 Temizle</button>
            </div>

            <label>Profil Fotoğrafı</label>
            <input type="file" id="img-upload" accept="image/*">
            
            <label>Kişisel Bilgiler</label>
            <input type="text" id="in-name" placeholder="Ad Soyad" oninput="triggerUpdate()">
            <input type="text" id="in-job" placeholder="Ünvan (Örn: Yazılım Mühendisi)" oninput="triggerUpdate()">
            <input type="email" id="in-mail" placeholder="E-posta" oninput="triggerUpdate()">
            <input type="text" id="in-phone" placeholder="Telefon Numarası" oninput="triggerUpdate()">
            
            <label>Bağlantılar (LinkedIn, GitHub vb.)</label>
            <div id="link-container"></div>
            <button type="button" class="btn-add" onclick="addLink()">+ Yeni Bağlantı Ekle</button>

            <label>Hakkımda</label>
            <textarea id="in-about" placeholder="Kendinizden bahsedin. Satır atlamak için Enter kullanın." oninput="triggerUpdate()" rows="4"></textarea>

            <label>Eğitim Bilgileri</label>
            <div id="edu-container"></div>
            <button type="button" class="btn-add" onclick="addEducation()">+ Yeni Eğitim Ekle</button>

            <label>İş Deneyimi</label>
            <div id="exp-container"></div>
            <button type="button" class="btn-add" onclick="addExperience()">+ Yeni Deneyim Ekle</button>
            
            <label>Sertifikalar</label>
            <div id="cert-container"></div>
            <button type="button" class="btn-add" onclick="addCertificate()">+ Yeni Sertifika Ekle</button>

            <label>Yabancı Diller</label>
            <div id="lang-container"></div>
            <button type="button" class="btn-add" onclick="addLanguage()">+ Yeni Dil Ekle</button>
            
            <label>Yetenekler (Etiket Sistemi)</label>
            <div class="tags-container" id="skills-tags"></div>
            <input type="text" id="in-skill" placeholder="Yetenek yazıp 'Enter'a basın" onkeypress="addSkill(event)">

            <label>Referanslar</label>
            <textarea id="in-ref" placeholder="Örn: Ali Yılmaz - Yöneticisi - 0555..." oninput="triggerUpdate()" rows="3"></textarea>
            
            <button class="pdf-btn" onclick="downloadPDF()">📄 PDF Olarak İndir</button>
        </aside>

        <main class="preview">
            <div class="toolbar">
                <label>🎨 Tema Rengi: <input type="color" id="color-picker" onchange="changeColor(this.value)"></label>
                <label>🔤 Font: 
                    <select id="font-picker" onchange="changeFont(this.value)">
                        <option value="'Segoe UI', sans-serif">Modern (Segoe UI)</option>
                        <option value="'Roboto', sans-serif">Kurumsal (Roboto)</option>
                        <option value="'Montserrat', sans-serif">Geometrik (Montserrat)</option>
                        <option value="'Playfair Display', serif">Klasik (Playfair)</option>
                    </select>
                </label>
                <label>🔍 Yakınlaştır: <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.1" value="1" oninput="changeZoom(this.value)"></label>
            </div>

            <div id="zoom-wrapper">
                <div id="cv-paper" class="minimalist-theme">
                    
                    <div class="theme-header prof-only">
                        <div class="photo-area"><img class="cv-img" src="https://via.placeholder.com/160" alt="Profil"></div>
                        <h1 class="out-name">AD SOYAD</h1>
                        <h2 class="out-job">Ünvan</h2>
                    </div>

                    <div class="cv-body-flex">
                        <div class="cv-left">
                            <div class="photo-area hide-prof"><img class="cv-img" src="https://via.placeholder.com/150" alt="Profil"></div>
                            
                            <div class="contact-area sec">
                                <h4>İletişim</h4>
                                <p class="out-mail" style="margin-bottom:3px;"></p>
                                <p class="out-phone"></p>
                            </div>
                            
                            <div class="link-area sec">
                                <h4>Bağlantılar</h4>
                                <div class="out-link"></div>
                            </div>
                            
                            <div class="lang-area sec">
                                <h4>Diller</h4>
                                <div class="out-lang"></div>
                            </div>
                            
                            <div class="hobby-area sec">
                                <h4>Yetenekler</h4>
                                <div class="out-hobby cv-tags"></div> 
                            </div>
                        </div>
                        
                        <div class="cv-right">
                            <div class="name-area hide-prof">
                                <h1 class="out-name"></h1>
                                <h2 class="out-job"></h2>
                            </div>
                            
                            <div class="about-area sec">
                                <h4>Hakkımda</h4>
                                <p class="out-about"></p>
                            </div>
                            
                            <div class="exp-area sec">
                                <h4>Deneyim</h4>
                                <div class="out-exp"></div>
                            </div>

                            <div class="edu-area sec">
                                <h4>Eğitim</h4>
                                <div class="out-edu"></div>
                            </div>
                            
                            <div class="cert-area sec">
                                <h4>Sertifikalar</h4>
                                <div class="out-cert"></div>
                            </div>

                            <div class="ref-area sec">
                                <h4>Referanslar</h4>
                                <p class="out-ref"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentTheme = 'minimalist-theme';
        let skillsArray = [];

        function startEditor(themeName, defaultColor) {
            currentTheme = themeName;
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('cv-paper').className = themeName;
            
            changeColor(defaultColor);
            document.getElementById('color-picker').value = defaultColor;
            
            loadData(); 
        }

        function goBack() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
        }

        function changeColor(color) {
            document.documentElement.style.setProperty('--cv-color', color);
            saveData();
        }

        function changeFont(font) {
            document.documentElement.style.setProperty('--cv-font', font);
            saveData();
        }

        function changeZoom(val) {
            if(window.innerWidth > 1000) {
                document.getElementById('zoom-wrapper').style.transform = `scale(${val})`;
            }
        }

        function createActionsHTML() {
            return `
                <div class="block-actions">
                    <div>
                        <button type="button" class="btn-sm btn-updown" onclick="moveUp(this)">↑</button>
                        <button type="button" class="btn-sm btn-updown" onclick="moveDown(this)">↓</button>
                    </div>
                    <button type="button" class="btn-sm btn-remove" onclick="removeElement(this)">Sil</button>
                </div>
            `;
        }

        function addLink(data = {}) {
            const block = document.createElement('div'); block.className = 'dynamic-block';
            block.innerHTML = `
                <input type="text" class="link-name" placeholder="Platform (Örn: LinkedIn, GitHub)" value="${data.name || ''}" oninput="triggerUpdate()">
                <input type="text" class="link-url" placeholder="URL veya Kullanıcı Adı" value="${data.url || ''}" oninput="triggerUpdate()">
                ${createActionsHTML()}
            `;
            document.getElementById('link-container').appendChild(block); triggerUpdate();
        }

        function addCertificate(data = {}) {
            const block = document.createElement('div'); block.className = 'dynamic-block';
            block.innerHTML = `
                <input type="text" class="cert-name" placeholder="Sertifika Adı" value="${data.name || ''}" oninput="triggerUpdate()">
                <div class="flex-row">
                    <input type="text" class="cert-inst" placeholder="Kurum (Örn: Udemy)" value="${data.inst || ''}" oninput="triggerUpdate()">
                    <input type="text" class="cert-year" placeholder="Yıl" value="${data.year || ''}" oninput="triggerUpdate()">
                </div>
                ${createActionsHTML()}
            `;
            document.getElementById('cert-container').appendChild(block); triggerUpdate();
        }

        function addEducation(data = {}) {
            const block = document.createElement('div'); block.className = 'dynamic-block';
            block.innerHTML = `
                <select class="edu-level" onchange="triggerUpdate()">
                    <option value="" ${data.level === '' ? 'selected' : ''}>Seviye Seçin...</option>
                    <option value="Lise" ${data.level === 'Lise' ? 'selected' : ''}>Lise</option>
                    <option value="Önlisans" ${data.level === 'Önlisans' ? 'selected' : ''}>Önlisans</option>
                    <option value="Lisans" ${data.level === 'Lisans' ? 'selected' : ''}>Lisans</option>
                    <option value="Yüksek Lisans" ${data.level === 'Yüksek Lisans' ? 'selected' : ''}>Yüksek Lisans</option>
                </select>
                <input type="text" class="edu-school" placeholder="Okul Adı ve Bölüm" value="${data.school || ''}" oninput="triggerUpdate()">
                <div class="flex-row">
                    <input type="text" class="edu-start" placeholder="Başlama" value="${data.start || ''}" oninput="triggerUpdate()">
                    <input type="text" class="edu-end" placeholder="Bitiş" value="${data.end || ''}" oninput="triggerUpdate()">
                </div>
                ${createActionsHTML()}
            `;
            document.getElementById('edu-container').appendChild(block); triggerUpdate();
        }

        function addExperience(data = {}) {
            const block = document.createElement('div'); block.className = 'dynamic-block';
            block.innerHTML = `
                <input type="text" class="exp-title" placeholder="Pozisyon / Ünvan" value="${data.title || ''}" oninput="triggerUpdate()">
                <input type="text" class="exp-company" placeholder="Şirket Adı" value="${data.company || ''}" oninput="triggerUpdate()">
                <div class="flex-row">
                    <input type="text" class="exp-start" placeholder="Başlama" value="${data.start || ''}" oninput="triggerUpdate()">
                    <input type="text" class="exp-end" placeholder="Bitiş" value="${data.end || ''}" oninput="triggerUpdate()">
                </div>
                <textarea class="exp-desc" placeholder="İş tanımı..." oninput="triggerUpdate()" rows="2">${data.desc || ''}</textarea>
                ${createActionsHTML()}
            `;
            document.getElementById('exp-container').appendChild(block); triggerUpdate();
        }

        function addLanguage(data = {}) {
            const block = document.createElement('div'); block.className = 'dynamic-block';
            block.innerHTML = `
                <input type="text" class="lang-name" placeholder="Dil (Örn: İngilizce)" value="${data.name || ''}" oninput="triggerUpdate()">
                <select class="lang-level" onchange="triggerUpdate()">
                    <option value="" ${data.level === '' ? 'selected' : ''}>Seviye...</option>
                    <option value="Başlangıç" ${data.level === 'Başlangıç' ? 'selected' : ''}>Başlangıç</option>
                    <option value="Orta" ${data.level === 'Orta' ? 'selected' : ''}>Orta</option>
                    <option value="İleri" ${data.level === 'İleri' ? 'selected' : ''}>İleri</option>
                </select>
                ${createActionsHTML()}
            `;
            document.getElementById('lang-container').appendChild(block); triggerUpdate();
        }

        function moveUp(btn) { 
            let block = btn.closest('.dynamic-block'); 
            if(block.previousElementSibling) { block.parentNode.insertBefore(block, block.previousElementSibling); triggerUpdate(); } 
        }
        function moveDown(btn) { 
            let block = btn.closest('.dynamic-block'); 
            if(block.nextElementSibling) { block.parentNode.insertBefore(block.nextElementSibling, block); triggerUpdate(); } 
        }
        function removeElement(btn) { btn.closest('.dynamic-block').remove(); triggerUpdate(); }

        function addSkill(e) {
            if(e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                let val = e.target.value.trim();
                if(val && !skillsArray.includes(val)) {
                    skillsArray.push(val);
                    e.target.value = '';
                    renderTags();
                    triggerUpdate();
                }
            }
        }
        function removeSkill(index) { skillsArray.splice(index, 1); renderTags(); triggerUpdate(); }
        function renderTags() {
            const container = document.getElementById('skills-tags');
            container.innerHTML = skillsArray.map((skill, i) => `<div class="tag">${skill} <span onclick="removeSkill(${i})">✕</span></div>`).join('');
        }

        function triggerUpdate() {
            syncToCV();
            saveData();
        }

        function syncToCV() {
            let nameVal = document.getElementById('in-name').value.trim();
            let jobVal = document.getElementById('in-job').value.trim();
            document.querySelectorAll('.out-name').forEach(el => el.innerText = nameVal || "Ad Soyad");
            document.querySelectorAll('.out-job').forEach(el => el.innerText = jobVal || "Ünvan");

            let mailVal = document.getElementById('in-mail').value.trim();
            let phoneVal = document.getElementById('in-phone').value.trim();
            document.querySelectorAll('.out-mail').forEach(el => el.innerText = mailVal || "eposta@adres.com");
            document.querySelectorAll('.out-phone').forEach(el => el.innerText = phoneVal || "05XX XXX XX XX");
            document.querySelectorAll('.contact-area').forEach(el => el.classList.toggle('is-empty', !(mailVal || phoneVal)));

            let aboutVal = document.getElementById('in-about').value.trim();
            document.querySelectorAll('.out-about').forEach(el => el.innerText = aboutVal || "Kendinizden kısaca bahsedin...");
            document.querySelectorAll('.about-area').forEach(el => el.classList.toggle('is-empty', !aboutVal));

            let refVal = document.getElementById('in-ref').value.trim();
            document.querySelectorAll('.out-ref').forEach(el => el.innerText = refVal || "Referans bilgileri...");
            document.querySelectorAll('.ref-area').forEach(el => el.classList.toggle('is-empty', !refVal));

            const cvTagsHtml = skillsArray.length > 0 ? skillsArray.map(s => `<div class="cv-tag">${s}</div>`).join('') : '<p style="font-size:13px; color:inherit;">Yetenekler...</p>';
            document.querySelectorAll('.out-hobby').forEach(el => el.innerHTML = cvTagsHtml);
            document.querySelectorAll('.hobby-area').forEach(el => el.classList.toggle('is-empty', skillsArray.length === 0));

            let linkHTML = '';
            document.querySelectorAll('#link-container .dynamic-block').forEach(block => {
                let n=block.querySelector('.link-name').value.trim(), u=block.querySelector('.link-url').value.trim();
                if(n||u) {
                    let href = u.startsWith('http') ? u : 'https://' + u;
                    linkHTML += `<div style="margin-bottom:8px; font-size:13px; word-break: break-all;"><strong>${n}</strong><br><a href="${href}" style="color:inherit; text-decoration:none; opacity:0.8;">${u}</a></div>`;
                }
            });
            document.querySelectorAll('.out-link').forEach(el => el.innerHTML = linkHTML || '<p style="font-size:13px; color:inherit;">Bağlantılar...</p>');
            document.querySelectorAll('.link-area').forEach(el => el.classList.toggle('is-empty', !linkHTML));

            let certHTML = '';
            document.querySelectorAll('#cert-container .dynamic-block').forEach(block => {
                let n=block.querySelector('.cert-name').value.trim(), i=block.querySelector('.cert-inst').value.trim(), y=block.querySelector('.cert-year').value.trim();
                if(n||i||y) certHTML += `<div style="margin-bottom:12px; font-size:13px; line-height:1.4;">${y ? `<span style="font-weight:bold; opacity:0.7; display:block; font-size:12px;">${y}</span>`:''}<b>${n}</b> ${i ? '- '+i:''}</div>`;
            });
            document.querySelectorAll('.out-cert').forEach(el => el.innerHTML = certHTML || '<p style="font-size:13px; color:inherit;">Sertifikalar...</p>');
            document.querySelectorAll('.cert-area').forEach(el => el.classList.toggle('is-empty', !certHTML));

            let eduHTML = '';
            document.querySelectorAll('#edu-container .dynamic-block').forEach(block => {
                let l=block.querySelector('.edu-level').value, s=block.querySelector('.edu-school').value.trim(), st=block.querySelector('.edu-start').value.trim(), en=block.querySelector('.edu-end').value.trim();
                if(l||s||st||en) eduHTML += `<div style="margin-bottom:12px; font-size:13px; line-height:1.4;">${st||en ? `<span style="font-weight:bold; opacity:0.7; display:block; font-size:12px;">${st||'-'} - ${en||'Devam'}</span>`:''}<b>${l}</b> ${s ? '- '+s:''}</div>`;
            });
            document.querySelectorAll('.out-edu').forEach(el => el.innerHTML = eduHTML || '<p style="font-size:13px; color:inherit;">Eğitim bilgileri...</p>');
            document.querySelectorAll('.edu-area').forEach(el => el.classList.toggle('is-empty', !eduHTML));

            let expHTML = '';
            document.querySelectorAll('#exp-container .dynamic-block').forEach(block => {
                let t=block.querySelector('.exp-title').value.trim(), c=block.querySelector('.exp-company').value.trim(), st=block.querySelector('.exp-start').value.trim(), en=block.querySelector('.exp-end').value.trim(), d=block.querySelector('.exp-desc').value.trim();
                if(t||c||st||en||d) expHTML += `<div style="margin-bottom:15px; font-size:13px; line-height:1.4;">${st||en ? `<span style="font-weight:bold; opacity:0.7; display:block; font-size:12px;">${st||'-'} - ${en||'Devam'}</span>`:''}<b>${t}</b> ${c ? '| '+c:''}${d ? `<div style="margin-top:4px; opacity:0.85; white-space:pre-wrap;">${d}</div>`:''}</div>`;
            });
            document.querySelectorAll('.out-exp').forEach(el => el.innerHTML = expHTML || '<p style="font-size:13px; color:inherit;">İş tecrübeleri...</p>');
            document.querySelectorAll('.exp-area').forEach(el => el.classList.toggle('is-empty', !expHTML));

            let langHTML = '';
            document.querySelectorAll('#lang-container .dynamic-block').forEach(block => {
                let n=block.querySelector('.lang-name').value.trim(), l=block.querySelector('.lang-level').value;
                if(n||l) langHTML += `<div style="margin-bottom:6px; font-size:13px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:3px;"><strong>${n}</strong><span style="opacity:0.8; font-size:12px;">${l}</span></div>`;
            });
            document.querySelectorAll('.out-lang').forEach(el => el.innerHTML = langHTML || '<p style="font-size:13px; color:inherit;">Diller...</p>');
            document.querySelectorAll('.lang-area').forEach(el => el.classList.toggle('is-empty', !langHTML));
        }

        function saveData() {
            const data = {
                name: document.getElementById('in-name').value, job: document.getElementById('in-job').value,
                mail: document.getElementById('in-mail').value, phone: document.getElementById('in-phone').value,
                about: document.getElementById('in-about').value, ref: document.getElementById('in-ref').value,
                skills: skillsArray, color: document.documentElement.style.getPropertyValue('--cv-color'),
                font: document.documentElement.style.getPropertyValue('--cv-font'),
                edu: Array.from(document.querySelectorAll('#edu-container .dynamic-block')).map(b => ({
                    level: b.querySelector('.edu-level').value, school: b.querySelector('.edu-school').value, start: b.querySelector('.edu-start').value, end: b.querySelector('.edu-end').value
                })),
                exp: Array.from(document.querySelectorAll('#exp-container .dynamic-block')).map(b => ({
                    title: b.querySelector('.exp-title').value, company: b.querySelector('.exp-company').value, start: b.querySelector('.exp-start').value, end: b.querySelector('.exp-end').value, desc: b.querySelector('.exp-desc').value
                })),
                lang: Array.from(document.querySelectorAll('#lang-container .dynamic-block')).map(b => ({
                    name: b.querySelector('.lang-name').value, level: b.querySelector('.lang-level').value
                })),
                links: Array.from(document.querySelectorAll('#link-container .dynamic-block')).map(b => ({
                    name: b.querySelector('.link-name').value, url: b.querySelector('.link-url').value
                })),
                certs: Array.from(document.querySelectorAll('#cert-container .dynamic-block')).map(b => ({
                    name: b.querySelector('.cert-name').value, inst: b.querySelector('.cert-inst').value, year: b.querySelector('.cert-year').value
                }))
            };
            localStorage.setItem('my_cv_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('my_cv_data');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('in-name').value = data.name || '';
                document.getElementById('in-job').value = data.job || '';
                document.getElementById('in-mail').value = data.mail || '';
                document.getElementById('in-phone').value = data.phone || '';
                document.getElementById('in-about').value = data.about || '';
                document.getElementById('in-ref').value = data.ref || '';
                
                skillsArray = data.skills || []; renderTags();

                if(data.color) { document.getElementById('color-picker').value = data.color; document.documentElement.style.setProperty('--cv-color', data.color); }
                if(data.font) { document.getElementById('font-picker').value = data.font; document.documentElement.style.setProperty('--cv-font', data.font); }

                document.getElementById('edu-container').innerHTML = '';
                if(data.edu && data.edu.length) data.edu.forEach(e => addEducation(e)); else addEducation();

                document.getElementById('exp-container').innerHTML = '';
                if(data.exp && data.exp.length) data.exp.forEach(e => addExperience(e)); else addExperience();

                document.getElementById('lang-container').innerHTML = '';
                if(data.lang && data.lang.length) data.lang.forEach(e => addLanguage(e)); else addLanguage();
                
                document.getElementById('link-container').innerHTML = '';
                if(data.links && data.links.length) data.links.forEach(e => addLink(e)); else addLink();

                document.getElementById('cert-container').innerHTML = '';
                if(data.certs && data.certs.length) data.certs.forEach(e => addCertificate(e)); else addCertificate();

            } else {
                if(document.getElementById('edu-container').innerHTML === '') addEducation();
                if(document.getElementById('exp-container').innerHTML === '') addExperience();
                if(document.getElementById('lang-container').innerHTML === '') addLanguage();
                if(document.getElementById('link-container').innerHTML === '') addLink();
                if(document.getElementById('cert-container').innerHTML === '') addCertificate();
            }
            syncToCV();
        }

        function clearData() {
            if(confirm("Tüm bilgileriniz silinecek. Emin misiniz?")) {
                localStorage.removeItem('my_cv_data');
                document.querySelectorAll('input:not([type="color"]):not([type="range"]), textarea').forEach(el => el.value = '');
                skillsArray = []; renderTags();
                
                ['edu', 'exp', 'lang', 'link', 'cert'].forEach(type => {
                    document.getElementById(type + '-container').innerHTML = '';
                });
                addEducation(); addExperience(); addLanguage(); addLink(); addCertificate();
                
                triggerUpdate();
            }
        }

        function loadDummyData() {
            document.getElementById('in-name').value = "Ahmet Yılmaz";
            document.getElementById('in-job').value = "Siber Güvenlik Analisti";
            document.getElementById('in-mail').value = "ahmet.yilmaz@email.com";
            document.getElementById('in-phone').value = "+90 555 123 45 67";
            document.getElementById('in-about').value = "Siber güvenlik alanında yenilikçi teknolojilere tutkulu analist. \n\nAğ güvenliği ve sızma testleri konularında kendimi geliştiriyorum. Temiz ve güvenli altyapılar oluşturmayı hedefliyorum.";
            document.getElementById('in-ref').value = "Mehmet Demir - CTO, TechCorp - 0532 999 88 77";
            
            skillsArray = ["C", "SQL", "HTML/CSS", "Siber Güvenlik", "Veri Bilimi"]; renderTags();

            document.getElementById('edu-container').innerHTML = '';
            addEducation({level: "Lisans", school: "Üniversitesi - Yönetim Bilişim Sistemleri", start: "2024", end: "Devam"});
            
            document.getElementById('exp-container').innerHTML = '';
            addExperience({title: "Siber Vatan Katılımcısı", company: "Eğitim Programı", start: "2025", end: "Devam", desc: "Siber güvenlik alanında uygulamalı eğitimler alındı."});

            document.getElementById('lang-container').innerHTML = '';
            addLanguage({name: "İngilizce", level: "Başlangıç"});
            
            document.getElementById('link-container').innerHTML = '';
            addLink({name: "LinkedIn", url: "linkedin.com/in/ahmetyilmaz"});
            addLink({name: "GitHub", url: "github.com/ahmetyilmaz"});
            
            document.getElementById('cert-container').innerHTML = '';
            addCertificate({name: "Siber Güvenlik Temelleri", inst: "Akbank Siber Güvenlik", year: "2026"});

            triggerUpdate();
        }

        document.getElementById('img-upload').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.querySelectorAll('.cv-img').forEach(img => img.src = event.target.result);
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function downloadPDF() {
            const element = document.getElementById('cv-paper');
            const originalTransform = element.parentElement.style.transform;
            element.parentElement.style.transform = 'scale(1)';
            
            // PDF için boş alanları tamamen gizleme modunu aç
            element.classList.add('pdf-mode');
            
            const opt = {
                margin: 0, filename: 'Özgeçmiş.pdf', image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                element.parentElement.style.transform = originalTransform; 
                element.classList.remove('pdf-mode'); // İşlem bitince normale döndür
            });
        }
    </script>
</body>
</html>
